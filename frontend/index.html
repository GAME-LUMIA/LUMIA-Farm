<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUMIA 농장</title>
  <!-- 셀프호스팅 폰트(scripts/fetch_fonts.mjs 생성) — 디스코드 액티비티 CSP는 외부 호스트 차단 -->
  <link rel="stylesheet" href="fonts/fonts.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stage">
    <div class="viewport">
      <canvas id="game" width="800" height="600"></canvas>

      <!-- 상단 HUD 바 -->
      <div class="hud-top">
        <div class="hud-profile">
          <div class="hud-avatar">🦊</div>
          <div class="hud-name">
            <span class="name" id="hudName">Kyle</span>
            <span class="level"><span id="hudLevel">3</span> · 농장</span>
          </div>
        </div>
        <div class="hud-currency">
          <div class="chip chip-gold">
            <span class="ic">🪙</span>
            <span class="val" id="hudGold">0</span>
            <span class="unit">G</span>
          </div>
          <div class="chip chip-luna">
            <span class="ic">🌾</span>
            <span class="val" id="hudLuna">0</span>
            <span class="unit">LN</span>
          </div>
          <button class="chip chip-btn" id="invBtn" title="인벤토리">🎒</button>
        </div>
      </div>

      <!-- 좌측 장착 펫 HUD (픽셀 아바타 + 배고픔 + 먹이주기) -->
      <div class="pet-hud" id="petHud"></div>

      <!-- 우상단 이벤트 로그 (펫 상호작용 알림) -->
      <div class="game-log" id="gameLog"></div>

      <!-- 작물 정보 툴팁 (작물 위에 섰을 때) -->
      <div class="crop-tip" id="cropTip" hidden></div>

      <!-- 하단 상호작용 힌트 -->
      <div class="hud-hint" id="hudHint" hidden>
        <span class="key" id="hintKey">E</span>
        <span class="text" id="hintText"></span>
      </div>

      <!-- 핫바 위: 현재 선택한 아이템의 종류·이름 -->
      <div class="hotbar-label" id="hotbarLabel" hidden></div>

      <!-- 하단 핫바 (항상 표시, 1~10번 슬롯) -->
      <div class="hotbar" id="hotbar"></div>

      <!-- 좌하단 컨트롤 안내 -->
      <div class="hud-controls">
        <span>WASD / 방향키 이동</span>
        <span>E 상호작용</span>
        <span>X 삽으로 캐기</span>
        <span>휠 핫바 전환</span>
      </div>

      <!-- 우측 TP 버튼 (상점/판매/집) -->
      <div class="hud-tp">
        <button class="tp-btn" id="tpShop"><span class="ic">🌱</span><span class="lb">상점</span></button>
        <button class="tp-btn" id="tpSell"><span class="ic">🧺</span><span class="lb">판매</span></button>
        <button class="tp-btn" id="tpHome"><span class="ic">🏠</span><span class="lb">집</span></button>
      </div>

      <!-- 토스트 알림 -->
      <div class="toast" id="toast" hidden></div>

      <!-- 상점 모달 -->
      <div class="shop-overlay" id="shopOverlay" hidden>
        <div class="shop-card">
          <div class="shop-header" id="shopHeader"></div>
          <div class="shop-body lumia-scroll" id="shopBody"></div>
          <div class="inv-tip" id="invTip" hidden></div>
        </div>
      </div>

      <!-- 펫 이름 변경 모달 -->
      <div class="rename-overlay" id="renameOverlay" hidden>
        <div class="rename-card">
          <div class="rename-head">
            <div class="rn-emoji" id="rnEmoji">🐾</div>
            <div class="rn-t">
              <span class="rn-title">펫 이름 변경</span>
              <span class="rn-sub" id="rnSub">최대 10자</span>
            </div>
          </div>
          <div class="rename-body">
            <input id="rnInput" maxlength="10" placeholder="이름 입력" autocomplete="off" />
            <div class="rn-btns">
              <button class="btn rn-cancel" id="rnCancel">취소</button>
              <button class="btn rn-save" id="rnSave">저장</button>
            </div>
            <span class="rn-note">비워두면 기본 종족 이름으로 돌아가요</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="crops.js"></script>
  <script src="pets.js"></script>
  <script src="net.js"></script>
  <script src="discord.js"></script>
  <script src="game.js"></script>
</body>
</html>
