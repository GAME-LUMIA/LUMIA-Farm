<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:inline-flex; align-items:center; gap:7px; padding:5px 11px 5px 6px; border-radius:20px; background:rgba(28,18,10,.9); box-shadow:0 4px 12px -3px rgba(0,0,0,.55), inset 0 0 0 1.5px rgba(200,169,110,.45); white-space:nowrap; font-family:'Noto Sans KR',sans-serif;">
  <span style="width:22px; height:22px; flex-shrink:0; border-radius:50%; background:rgba(255,244,221,.12); display:flex; align-items:center; justify-content:center; font-size:13px;">{{ emoji }}</span>
  <span style="font-size:11.5px; color:#fff4dd;"><b style="color:#ffd98a;">{{ name2 }}</b>{{ verb }}</span>
  <span style="font-size:11.5px; font-weight:800; color:#fff;">{{ item }}</span>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:230,&quot;height&quot;:38},&quot;name2&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;루미&quot;},&quot;verb&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;가 수확했어요&quot;},&quot;emoji&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;🥕&quot;},&quot;item&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;당근&quot;}}"></script>
</body>
</html>
