<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; flex-direction:column; gap:6px; padding:6px 7px 7px; border-radius:10px; background:rgba(28,18,10,.85); box-shadow:0 3px 10px -3px rgba(0,0,0,.5), inset 0 0 0 1.5px rgba(200,169,110,.4); font-family:'Noto Sans KR',sans-serif;">
  <div style="display:flex; align-items:center; gap:8px;">
    <span style="width:30px; height:30px; flex-shrink:0; border-radius:8px; background:rgba(255,244,221,.13); display:flex; align-items:center; justify-content:center;"><img src="assets/pet-{{ pet }}.png" style="width:26px; height:26px; image-rendering:pixelated;"></span>
    <div style="display:flex; flex-direction:column; gap:2px; min-width:0; flex:1;">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:4px;">
        <span style="display:inline-flex; align-items:center; gap:4px; min-width:0;">
          <span style="font-family:'Press Start 2P'; font-size:6px; color:#fff; background:{{ gradeColor }}; padding:2px 4px; border-radius:4px;">{{ grade }}</span>
          <span style="color:#fff4dd; font-size:12px; font-weight:800;">{{ species }}</span>
        </span>
        <span style="color:#7fd14f; font-size:8px; font-weight:700;">{{ hunger }}%</span>
      </div>
      <span style="color:#c7a76a; font-size:9px;">{{ ability }}</span>
      <div style="margin-top:2px; height:6px; border-radius:3px; background:rgba(0,0,0,.45); overflow:hidden;"><div style="height:100%; width:{{ hunger }}%; background:#7fd14f; border-radius:3px;"></div></div>
    </div>
  </div>
  <div style="width:100%; padding:5px 0; border-radius:7px; background:linear-gradient(180deg,#f0894a,#d66a2f); color:#fff; font-weight:800; font-size:11px; text-align:center; box-shadow:inset 0 2px 0 rgba(255,255,255,.3), 0 2px 0 #b5551f;">먹이주기</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:190,&quot;height&quot;:86},&quot;pet&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;lumi&quot;},&quot;species&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;루미&quot;},&quot;grade&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;에픽&quot;},&quot;gradeColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#9a68e0&quot;},&quot;ability&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;🌾 수확 도우미&quot;},&quot;hunger&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;97&quot;}}"></script>
</body>
</html>
