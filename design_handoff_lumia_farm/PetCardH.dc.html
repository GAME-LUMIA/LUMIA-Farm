<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="flex-shrink:0; width:146px; display:flex; flex-direction:column; gap:5px; padding:6px 7px; border-radius:9px; background:rgba(28,18,10,.9); box-shadow:inset 0 0 0 1.5px rgba(200,169,110,.4); font-family:'Noto Sans KR',sans-serif;">
  <div style="display:flex; align-items:center; gap:6px;">
    <span style="width:26px; height:26px; flex-shrink:0; border-radius:7px; background:rgba(255,244,221,.13); display:flex; align-items:center; justify-content:center;"><img src="assets/pet-{{ pet }}.png" style="width:23px; height:23px; image-rendering:pixelated;"></span>
    <div style="display:flex; flex-direction:column; gap:1px; min-width:0; flex:1;">
      <span style="display:inline-flex; align-items:center; gap:3px;"><span style="font-family:'Press Start 2P'; font-size:5px; color:#fff; background:{{ gradeColor }}; padding:2px 3px; border-radius:3px;">{{ grade }}</span><span style="color:#fff4dd; font-size:11px; font-weight:800;">{{ species }}</span></span>
      <span style="color:#c7a76a; font-size:8.5px;">{{ ability }} · {{ hunger }}%</span>
    </div>
  </div>
  <div style="width:100%; padding:4px 0; border-radius:6px; background:linear-gradient(180deg,#f0894a,#d66a2f); color:#fff; font-weight:800; font-size:10px; text-align:center; box-shadow:inset 0 1px 0 rgba(255,255,255,.3);">먹이주기</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:150,&quot;height&quot;:56},&quot;pet&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;lumi&quot;},&quot;species&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;루미&quot;},&quot;grade&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;에픽&quot;},&quot;gradeColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#9a68e0&quot;},&quot;ability&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;🌾 수확&quot;},&quot;hunger&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;97&quot;}}"></script>
</body>
</html>
